<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B1+ Word Master – Luyện từ vựng tiếng Anh</title>
<style>
  :root {
    --surface-0: #f8fafc;
    --surface-1: #f1f5f9;
    --surface-2: #e2e8f0;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --border-accent: #6ee7b7;
    --border-success: #4ade80;
    --border-danger: #f87171;
    --bg-accent: #f0fdf4;
    --bg-success: #f0fdf4;
    --bg-danger: #fff1f2;
    --bg-warning: #fffbeb;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --text-accent: #059669;
    --text-success: #16a34a;
    --text-danger: #dc2626;
    --text-warning: #d97706;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: var(--text-primary); }
  #root { max-width: 540px; margin: 0 auto; min-height: 100vh; }

  @keyframes pop { 0%{transform:scale(0.7);opacity:0} 70%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes glow { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} 50%{box-shadow:0 0 0 8px rgba(34,197,94,0.15)} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }

  .card-pop { animation: pop 0.35s ease both; }
  .card-shake { animation: shake 0.4s ease; }
  .slide-up { animation: slideUp 0.3s ease both; }
  .correct-glow { animation: glow 0.8s ease; }
  .btn-choice { transition: transform 0.15s, background 0.2s, border 0.2s; cursor: pointer; }
  .btn-choice:hover:not(:disabled) { transform: translateY(-2px); }
  .btn-choice:active:not(:disabled) { transform: scale(0.97); }
  .pulse-anim { animation: pulse 2s infinite; }

  /* Layout helpers */
  .screen { padding: 1.5rem; }
  .screen-game { padding: 1.25rem; }
  .screen-result { padding: 2rem 1.5rem; text-align: center; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .flex-row { display: flex; gap: 8px; }
  .stat-card { background: var(--surface-1); border-radius: 10px; padding: 10px; text-align: center; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; line-height: 1.3; }
  .stat-value { font-size: 22px; font-weight: 500; }
  .pill-btn { padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .card-box { border-radius: 12px; overflow: hidden; margin-bottom: 1rem; border: 0.5px solid var(--border); background: var(--surface-1); }
  .illus-area { height: 220px; background: var(--surface-0); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .word-info { padding: 1rem 1.25rem; }
  .tag { font-size: 12px; background: var(--surface-2); color: var(--text-secondary); padding: 3px 10px; border-radius: 20px; border: 0.5px solid var(--border); }
  .ipa { font-size: 13px; color: var(--text-muted); font-family: monospace; }
  .speak-btn { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 14px; color: var(--text-secondary); transition: transform 0.15s; }
  .speak-btn:hover { transform: scale(1.1); }
  .progress-bar { background: var(--surface-1); border-radius: 4px; height: 6px; margin-bottom: 1rem; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#6EE7B7,#3B82F6); border-radius: 4px; transition: width 0.5s ease; }
  .input-field { flex: 1; padding: 12px 14px; border-radius: 10px; font-size: 14px; background: var(--surface-2); color: var(--text-primary); outline: none; transition: border 0.2s; }
  .ok-btn { padding: 12px 18px; background: var(--text-primary); color: var(--surface-2); border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .feedback-box { margin-top: 8px; padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; animation: slideUp 0.25s ease; }
  .main-btn { width: 100%; padding: 14px; background: var(--text-primary); color: var(--surface-2); border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; transition: transform 0.15s; }
  .main-btn:hover { transform: scale(1.02); }
  .secondary-btn { flex: 1; padding: 13px; background: transparent; color: var(--text-primary); border: 0.5px solid var(--border-strong); border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .mode-tab { flex: 1; padding: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 12px; transition: all 0.2s; }
  .srs-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; transition: background 0.3s; }
  .due-banner { background: var(--bg-accent); border: 1px solid var(--border-accent); border-radius: 10px; padding: 12px 16px; margin-bottom: 1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; animation: pulse 2s infinite; }
  .flashcard-word { font-size: 36px; font-weight: 500; margin-bottom: 6px; animation: pop 0.3s ease; }
  .flashcard-hint { font-size: 14px; color: var(--text-muted); }
  .flashcard-vn { font-size: 28px; font-weight: 500; color: var(--text-accent); margin-bottom: 6px; }
  .flashcard-ex { font-size: 15px; color: var(--text-secondary); font-style: italic; line-height: 1.6; }
  .streak-msg { margin-top: 10px; text-align: center; font-size: 12px; color: var(--text-secondary); animation: pulse 1s infinite; }
  .fb-btn { flex: 1; padding: 13px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: transform 0.15s; }
  .fb-btn:hover { transform: scale(1.02); }
</style>
</head>

const UNIQUE = Array.from(new Map(ALL_WORDS.map(w=>[w.word,w])).values());
const TOPICS = ["Tất cả", ...Array.from(new Set(UNIQUE.map(w=>w.topic)))];
const MODES = ["multiple_choice","fill_blank","flashcard"];
const MODE_LABELS = {multiple_choice:"Trắc nghiệm", fill_blank:"Điền từ", flashcard:"Flashcard"};
const SRS_INT = [1,3,7,14,30,60];
const SK = "wm_srs_v3";

// ── Helpers ──
function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function getWrong(c,pool){return shuffle(pool.filter(w=>w.word!==c.word)).slice(0,3).map(w=>w.vn);}
function speak(t){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=0.85;window.speechSynthesis.speak(u);}
function isDue(d){if(!d||!d.nextReview)return true;return Date.now()>=d.nextReview;}
function loadSRS(){try{return JSON.parse(localStorage.getItem(SK)||"{}");}catch{return{};}}
function saveSRS(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch{}}

// ── State ──
let state = {
  screen: "home",
  mode: "multiple_choice",
  topic: "Tất cả",
  queue: [],
  idx: 0,
  xp: 0,
  streak: 0,
  choices: [],
  selected: null,
  flipped: false,
  input: "",
  inputResult: null,
  sCorr: 0,
  sTotal: 0,
  srs: loadSRS(),
  showSRS: false,
  cardAnim: "",
  resultAnim: "",
};

function getFiltered() {
  return state.topic === "Tất cả" ? UNIQUE : UNIQUE.filter(w=>w.topic===state.topic);
}
function getDue() {
  return getFiltered().filter(w=>isDue(state.srs[w.word]));
}

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function buildChoices(word, pool) {
  return shuffle([word.vn, ...getWrong(word, pool)]);
}

function startGame(m, pool) {
  const filtered = getFiltered();
  const due = getDue();
  const p = pool || shuffle(due.length>=5?due:filtered).slice(0,12);
  const choices = m==="multiple_choice"&&p.length ? buildChoices(p[0],filtered) : [];
  setState({queue:p,idx:0,sCorr:0,sTotal:0,selected:null,flipped:false,input:"",inputResult:null,choices,cardAnim:"card-pop",screen:"game",mode:m});
  setTimeout(()=>{ const inp=document.getElementById("fill-input"); if(inp) inp.focus(); },100);
}

function animateCard(anim) {
  setState({cardAnim:""});
  setTimeout(()=>setState({cardAnim:anim}),10);
}

function advance(correct) {
  const current = state.queue[state.idx];
  const w = current.word;
  const prev = state.srs[w]||{level:0};
  const nl = correct ? Math.min((prev.level||0)+1, SRS_INT.length-1) : 0;
  const newSrs = {...state.srs, [w]:{level:nl,nextReview:Date.now()+SRS_INT[nl]*86400000,lastCorrect:correct}};
  saveSRS(newSrs);
  const newSCorr = state.sCorr + (correct?1:0);
  const newSTotal = state.sTotal + 1;
  const newXp = state.xp + (correct?10:0);
  const newStreak = correct ? state.streak+1 : 0;
  setState({srs:newSrs,sCorr:newSCorr,sTotal:newSTotal,xp:newXp,streak:newStreak});
  if(correct) animateCard("card-pop"); else animateCard("card-shake");
  const ni = state.idx+1;
  setTimeout(()=>{
    if(ni>=state.queue.length){setState({screen:"result"});}
    else{
      const filtered=getFiltered();
      const choices=state.mode==="multiple_choice"?buildChoices(state.queue[ni],filtered):[];
      setState({idx:ni,selected:null,flipped:false,input:"",inputResult:null,choices,cardAnim:"slide-up"});
      setTimeout(()=>{ const inp=document.getElementById("fill-input"); if(inp) inp.focus(); },80);
    }
  }, correct?600:900);
}

function handleChoice(c) {
  if(state.selected) return;
  const current = state.queue[state.idx];
  const ok = c===current.vn;
  setState({selected:c, resultAnim:ok?"correct-glow":""});
  setTimeout(()=>{advance(ok); setState({resultAnim:""});},800);
}

function handleFill() {
  if(state.inputResult) return;
  const current = state.queue[state.idx];
  const ok = state.input.trim().toLowerCase()===current.word.toLowerCase();
  setState({inputResult:ok?"correct":"wrong"});
  setTimeout(()=>advance(ok),900);
}

// ── Render ──
function renderDots(lvl) {
  return [0,1,2,3,4,5].map(n=>`<span class="srs-dot" style="background:${n<lvl?'#22C55E':'var(--border-strong)'}"></span>`).join(" ");
}

  const filtered = getFiltered();
  const due = getDue();
  const current = state.queue[state.idx];

      </div>

    </div>` : "";

    const modeTabs = MODES.map(m=>`<button class="mode-tab" onclick="setState({mode:'${m}'})" style="background:${state.mode===m?'var(--surface-2)':'transparent'};color:${state.mode===m?'var(--text-primary)':'var(--text-secondary)'}">${MODE_LABELS[m]}</button>`).join("");
    html = `<div class="screen">
      <div class="flex-between" style="margin-bottom:1.25rem">

          <div style="font-size:11px;font-weight:500;color:var(--text-muted);letter-spacing:1px;margin-bottom:4px">B1+ WORD MASTER</div>

        <div style="display:flex;flex-wrap:wrap;gap:6px">${topicBtns}</div>
      </div>
      <div style="background:var(--surface-1);border-radius:10px;padding:4px;display:flex;gap:4px;margin-bottom:1rem">${modeTabs}</div>
      <button class="main-btn" onclick="startGame(state.mode)">Bắt đầu luyện tập →</button>
    </div>`;
    document.getElementById("root").innerHTML = html; return;
  }

  // ── Result ──
  if(state.screen==="result") {
    const emoji = state.sCorr===state.sTotal?"🏆":state.sCorr>=state.sTotal*0.7?"⭐":"💪";
    html = `<div class="screen-result">
      <div style="font-size:52px;margin-bottom:10px;animation:pop 0.5s ease both">${emoji}</div>
      <h2 style="font-size:20px;font-weight:500;margin:0 0 6px">Hoàn thành!</h2>
      <p style="color:var(--text-secondary);margin-bottom:1.5rem;font-size:14px">Đúng <strong>${state.sCorr}/${state.sTotal}</strong> từ · +${state.sCorr*10} XP</p>
      <div class="grid-2" style="margin-bottom:1.5rem">
        <div class="stat-card" style="animation:slideUp 0.3s 0s both"><div class="stat-label">Đúng</div><div style="font-size:20px;font-weight:500;color:var(--text-success)">${state.sCorr}</div></div>
        <div class="stat-card" style="animation:slideUp 0.3s 0.08s both"><div class="stat-label">Sai</div><div style="font-size:20px;font-weight:500;color:var(--text-danger)">${state.sTotal-state.sCorr}</div></div>
        <div class="stat-card" style="animation:slideUp 0.3s 0.16s both"><div class="stat-label">XP tổng</div><div style="font-size:20px;font-weight:500">${state.xp}</div></div>
        <div class="stat-card" style="animation:slideUp 0.3s 0.24s both"><div class="stat-label">Level</div><div style="font-size:20px;font-weight:500">${level}</div></div>
      </div>
      <div class="flex-row">
        <button style="flex:1;padding:13px;background:var(--text-primary);color:var(--surface-2);border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer" onclick="startGame(state.mode)">Chơi lại</button>
        <button class="secondary-btn" onclick="setState({screen:'home'})">Trang chủ</button>
      </div>
    </div>`;
    document.getElementById("root").innerHTML = html; return;
  }

  // ── Game ──
  if(!current){document.getElementById("root").innerHTML="";return;}
  const pct = (state.idx/state.queue.length)*100;

  let cardContent = "";
  if(state.mode==="flashcard") {
    if(!state.flipped) {
      cardContent = `<div onclick="setState({flipped:true})" style="cursor:pointer;text-align:center;padding:0.5rem 0;user-select:none">
        <div class="flashcard-word">${current.word}</div>
        <div class="flashcard-hint">Nhấn để xem nghĩa ↓</div>
      </div>`;
    } else {
      cardContent = `<div onclick="setState({flipped:false})" style="cursor:pointer;text-align:center;padding:0.5rem 0;animation:slideUp 0.25s ease">
        <div class="flashcard-vn">${current.vn}</div>
        <div class="flashcard-ex">${current.example.replace("___",`[${current.word}]`)}</div>
      </div>`;
    }
  } else if(state.mode==="multiple_choice") {
    cardContent = `<div style="font-size:34px;font-weight:500;margin:4px 0 8px">${current.word}</div>
      <div style="font-size:15px;color:var(--text-secondary);font-style:italic;line-height:1.6">${current.example.replace("___","______")}</div>`;
  } else {
    cardContent = `<div style="font-size:15px;color:var(--text-secondary);font-style:italic;line-height:1.7;margin-bottom:8px">${current.example.replace("___","________")}</div>
      <div style="font-size:15px;color:var(--text-muted)">Nghĩa: <strong style="color:var(--text-primary);font-size:16px">${current.vn}</strong></div>`;
  }

  let actionArea = "";
  if(state.mode==="multiple_choice") {
    const btns = state.choices.map((c,i)=>{
      const isC=c===current.vn, isSel=state.selected===c;
      let bg="var(--surface-1)", border="0.5px solid var(--border)", col="var(--text-primary)";
      if(state.selected){
        if(isC){bg="var(--bg-success)";border="1.5px solid var(--border-success)";col="var(--text-success)";}
        else if(isSel){bg="var(--bg-danger)";border="1.5px solid var(--border-danger)";col="var(--text-danger)";}
      }
      const prefix = state.selected&&isC?"✓ ":state.selected&&isSel&&!isC?"✗ ":"";
      return `<button class="btn-choice" ${state.selected?'disabled':''} onclick="handleChoice('${c.replace(/'/g,"\\'")}')" style="padding:16px 10px;background:${bg};border:${border};border-radius:10px;font-size:15px;font-weight:500;color:${col};animation-delay:${i*0.06}s">${prefix}${c}</button>`;
    }).join("");
    actionArea = `<div class="grid-2 ${state.resultAnim}">${btns}</div>`;
  } else if(state.mode==="fill_blank") {
    const borderColor = state.inputResult==="correct"?"var(--border-success)":state.inputResult==="wrong"?"var(--border-danger)":"var(--border-strong)";
    const feedback = state.inputResult ? `<div class="feedback-box" style="background:${state.inputResult==="correct"?'var(--bg-success)':'var(--bg-danger)'};color:${state.inputResult==="correct"?'var(--text-success)':'var(--text-danger)'}">
      ${state.inputResult==="correct"?"✓ Chính xác! Thêm 10 XP":`✗ Đáp án đúng: "${current.word}"`}
    </div>` : "";
    actionArea = `<div>
      <div class="flex-row">
        <input id="fill-input" class="input-field" style="border:1.5px solid ${borderColor}" value="${state.input.replace(/"/g,'&quot;')}" placeholder="Nhập từ tiếng Anh..." oninput="state.input=this.value" onkeydown="if(event.key==='Enter')handleFill()"/>
        <button class="ok-btn" onclick="handleFill()">OK</button>
      </div>
      ${feedback}
    </div>`;
  } else if(state.mode==="flashcard" && state.flipped) {
    actionArea = `<div class="flex-row" style="margin-top:8px;animation:slideUp 0.25s ease">
      <button class="fb-btn" onclick="advance(false)" style="background:var(--bg-danger);color:var(--text-danger);border:1px solid var(--border-danger)">😅 Chưa nhớ</button>
      <button class="fb-btn" onclick="advance(true)" style="background:var(--bg-success);color:var(--text-success);border:1px solid var(--border-success)">✓ Đã nhớ!</button>
    </div>`;
  }

  const streakMsg = state.streak>=3 ? `<div class="streak-msg">🔥 Chuỗi ${state.streak} từ liên tiếp — xuất sắc!</div>` : "";

  html = `<div class="screen-game">
    <div class="flex-between" style="margin-bottom:0.75rem">
      <button onclick="setState({screen:'home'})" style="background:transparent;border:none;cursor:pointer;color:var(--text-secondary);font-size:13px">← Thoát</button>
      <span style="font-size:13px;color:var(--text-secondary)">${state.idx+1}/${state.queue.length}</span>
      <span style="font-size:12px;font-weight:500;color:var(--text-accent)">⭐ ${state.xp} XP</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card-box ${state.cardAnim}">
      <div class="illus-area">${getIllus(current.word)}</div>
      <div class="word-info">
        <div class="flex-between" style="margin-bottom:10px">
          <div style="display:flex;gap:6px;align-items:center">
            <span class="tag">${current.topic}</span>
            <div style="display:flex;gap:2px">${renderDots(srsLvl)}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="ipa">${current.ipa}</span>
            <button class="speak-btn" onclick="speak('${current.word}')">🔊</button>
          </div>
        </div>
        ${cardContent}
      </div>
    </div>
    ${actionArea}
    ${streakMsg}
  </div>`;

  document.getElementById("root").innerHTML = html;
}

// Start
render();
</script>
</body>
</html>
